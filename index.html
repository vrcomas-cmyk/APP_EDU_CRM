<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Visitas PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1E88E5">
</head>
<body>
    <header>
        <h1>📅 Registro de Visitas</h1>
        <div>
            <button id="btn-sync" class="btn-sync">🔄 Sincronizar</button>
            <span id="online-status" class="badge online">Online</span>
        </div>
    </header>

    <main>
        <section class="card">
            <h2>Agendar Nueva Visita</h2>
            <!-- SOLO DEBE HABER UN FORMULARIO AQUI -->
            <form id="visita-form">
                <!-- Autocompletados (Datalists invisibles pero necesarios) -->
                <datalist id="lista-educadores"></datalist>
                <datalist id="lista-clientes"></datalist>
                <datalist id="lista-sectores"></datalist>

                <!-- Datos Generales de la Visita -->
                <div class="form-group">
                    <label for="educador">Educador (Tu Nombre):</label>
                    <input type="text" id="educador" list="lista-educadores" required placeholder="Escribe tu nombre...">
                    <input type="hidden" id="educador-correo">
                </div>

                <div class="form-group">
                    <label for="cliente">Cliente:</label>
                    <input type="text" id="cliente" list="lista-clientes" required placeholder="Busca N° o Razón Social...">
                </div>

                <div class="form-group">
                    <label for="fecha">Fecha y Hora:</label>
                    <input type="datetime-local" id="fecha" required>
                </div>
                
                <hr style="border: 1px solid #eee; margin: 20px 0;">
                
                <!-- CONTENEDOR DE SECTORES Y ACTIVIDADES -->
                <div id="sectores-container">
                    <!-- Bloque inicial de Sector/Actividad -->
                    <div class="sector-block form-group" style="border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 15px;">
                        <label>Sector a revisar:</label>
                        <input type="text" class="sector-input" list="lista-sectores" required placeholder="Escribe el sector...">
                        
                        <label style="margin-top: 10px; display: block;">Actividad para este sector:</label>
                        <textarea class="actividad-input" required placeholder="Detalles de la revisión..."></textarea>
                    </div>
                </div>

                <!-- Botón para añadir más sectores -->
                <button type="button" id="btn-add-sector" class="btn" style="background-color: #e0e0e0; color: #333; margin-bottom: 20px;">
                    ➕ Añadir otro sector
                </button>

                <button type="submit" class="btn">💾 Guardar Visita Completa</button>
            </form>
        </section>

        <section class="card">
            <h2>Visitas Agendadas</h2>
            <div id="lista-visitas" class="lista-visitas">
                <!-- Aquí se cargarán las visitas -->
                <p class="empty-state">No hay visitas agendadas.</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
