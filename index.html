<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Plan de Trabajo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F5F8F7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0D1112" media="(prefers-color-scheme: dark)">
    <!-- Sin `media`: cuando hay un tema elegido a mano, este gana sobre los dos de arriba. -->
    <meta name="theme-color" id="meta-tema-elegido">
    <script>
        // Bloqueante y a propósito: fija el tema ANTES del primer paint. Si esto corriera en
        // js/app.js (un módulo, que siempre difiere), habría un parpadeo del tema por defecto
        // al tema guardado en cada carga.
        (function () {
            try {
                var t = localStorage.getItem('pdt_tema');
                var colores = { light: '#F5F8F7', dark: '#0D1112', degasa: '#F7F9F1' };
                if (t === 'light' || t === 'dark' || t === 'degasa') {
                    document.documentElement.dataset.theme = t;
                    document.getElementById('meta-tema-elegido').setAttribute('content', colores[t]);
                }
            } catch (e) {}
        })();
    </script>
</head>
<body>
    <div class="gate" id="gate">
        <div class="gate-caja">
            <span class="appbar-mark">PLAN DE TRABAJO</span>
            <p class="gate-sub">Entra con tu cuenta de DEGASA para ver y registrar tus visitas.</p>
            <div id="gate-boton"></div>
        </div>
    </div>

    <div class="gate" id="sin-invitacion" hidden>
        <div class="gate-caja">
            <span class="appbar-mark">PLAN DE TRABAJO</span>
            <p class="gate-sub">
                Esta cuenta no tiene invitación para entrar. Pídele a un administrador que
                te invite y vuelve a intentarlo.
            </p>
            <p class="eyebrow" id="sin-invitacion-correo"></p>
            <button type="button" id="sin-invitacion-salir" class="btn-hoy">Usar otra cuenta</button>
        </div>
    </div>

    <div class="app" id="app" hidden>
        <header class="appbar">
            <span class="appbar-mark">PLAN DE TRABAJO</span>

            <div class="datenav" id="cal-datenav">
                <button type="button" id="cal-anterior" class="arrow" aria-label="Anterior">‹</button>
                <button type="button" id="cal-siguiente" class="arrow" aria-label="Siguiente">›</button>
                <span class="datenav-label" id="cal-titulo">—</span>
                <button type="button" id="cal-hoy" class="btn-hoy">Hoy</button>
            </div>

            <div class="seg" id="cal-modo" role="group" aria-label="Vista del calendario">
                <button type="button" data-modo="dia" aria-pressed="true">Día</button>
                <button type="button" data-modo="semana" aria-pressed="false">Semana</button>
                <button type="button" data-modo="mes" aria-pressed="false">Mes</button>
            </div>

            <span class="appbar-spacer"></span>

            <div class="seg tema-switch" id="tema-switch" role="group" aria-label="Tema">
                <button type="button" data-tema="light" aria-pressed="false" aria-label="Claro" title="Claro">
                    <span class="tema-swatch tema-swatch-claro"></span>
                </button>
                <button type="button" data-tema="dark" aria-pressed="false" aria-label="Oscuro" title="Oscuro">
                    <span class="tema-swatch tema-swatch-oscuro"></span>
                </button>
                <button type="button" data-tema="degasa" aria-pressed="false" aria-label="DEGASA" title="DEGASA">
                    <span class="tema-swatch tema-swatch-degasa"></span>
                </button>
            </div>

            <button type="button" id="btn-deuda" class="deuda" hidden>
                <span class="dot st-faltan-evidencias" style="--st: var(--st-part)"></span>
                <span id="deuda-n">0</span> evidencias
            </button>

            <button type="button" id="btn-sync" class="sync">
                <span class="led"></span><span id="sync-txt">Al día</span>
            </button>

            <button type="button" id="btn-sesion" class="sesion-chip" aria-label="Cerrar sesión">
                <img id="sesion-foto" alt="" hidden>
                <span id="sesion-nombre"></span>
            </button>
        </header>

        <!-- El riel de módulos y la vista activa los renderiza React aquí. -->
        <main class="main" id="main"></main>
    </div>

    <button type="button" id="fab" class="fab" hidden>
        Nueva visita <kbd>N</kbd>
    </button>

    <!-- Sin `aria-live` aquí: cada toast lleva el suyo. Marcar el contenedor estático
         no anunciaba los toasts montados después por lectores que arrancaron al cargar. -->
    <div class="toasts" id="toasts"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
